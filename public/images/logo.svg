<svg viewBox="0 0 210 60" xmlns="http://www.w3.org/2000/svg">

  <!-- Glow behind 1st place bar -->
  <rect x="16" y="8" width="18" height="54" rx="5" fill="#ff00ff" opacity="0">
    <animate attributeName="opacity" values="0;0;0.35;0" dur="2s" begin="1.2s" repeatCount="indefinite"
             calcMode="spline" keySplines="0 0 1 1;0.4 0 0.6 1;0.4 0 0.6 1" />
  </rect>

  <!-- 2nd place bar (left, blue) -->
  <rect x="0" y="22" width="14" height="38" rx="3" fill="#4a9eff">
    <animate attributeName="y" from="60" to="22" dur="0.5s" begin="0s" fill="freeze"
             calcMode="spline" keySplines="0.4 0 0.2 1" />
    <animate attributeName="height" from="0" to="38" dur="0.5s" begin="0s" fill="freeze"
             calcMode="spline" keySplines="0.4 0 0.2 1" />
  </rect>

  <!-- 1st place bar (middle, magenta) -->
  <rect x="18" y="10" width="14" height="50" rx="3" fill="#ff00ff">
    <animate attributeName="y" from="60" to="10" dur="0.5s" begin="0.15s" fill="freeze"
             calcMode="spline" keySplines="0.4 0 0.2 1" />
    <animate attributeName="height" from="0" to="50" dur="0.5s" begin="0.15s" fill="freeze"
             calcMode="spline" keySplines="0.4 0 0.2 1" />
  </rect>

  <!-- 3rd place bar (right, gold) -->
  <rect x="36" y="34" width="14" height="26" rx="3" fill="#ffd700">
    <animate attributeName="y" from="60" to="34" dur="0.5s" begin="0.3s" fill="freeze"
             calcMode="spline" keySplines="0.4 0 0.2 1" />
    <animate attributeName="height" from="0" to="26" dur="0.5s" begin="0.3s" fill="freeze"
             calcMode="spline" keySplines="0.4 0 0.2 1" />
  </rect>

  <!-- "Rankr" text -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.6s" fill="freeze" />
    <animateTransform attributeName="transform" type="translate"
                      from="0 8" to="0 0" dur="0.4s" begin="0.6s" fill="freeze" />
    <text x="60" y="46"
          font-family="Rubik, sans-serif"
          font-weight="700"
          font-size="40"
          fill="white"
          letter-spacing="2">Rankr</text>
  </g>

</svg>
