<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rankr — Game</title>
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bricolage+Grotesque:ital,opsz,wght@1,12..96,700..800&family=JetBrains+Mono:wght@400;500;600&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/styles/tokens.css" />
  <link rel="stylesheet" href="/styles/components.css" />
  <link rel="stylesheet" href="/styles/pages.css" />
</head>
<body>

<header class="site-header container">
  <div class="header-row">
    <a href="/" class="name-title">
      <span class="brand-bars" aria-hidden="true"><span></span><span></span><span></span></span>
      <span class="wordmark">Rank<em>r</em></span>
    </a>
    <nav class="desktop-nav">
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li class="platforms-dropdown"><a href="#">Platforms <span class="caret">▼</span></a></li>
        <li class="genres-dropdown"><a href="#">Genres <span class="caret">▼</span></a></li>
        <li><a href="/about.html">About</a></li>
      </ul>
    </nav>
    <div class="nav-right">
      <div class="search-bar">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" placeholder="Search games…" />
      </div>
    </div>
  </div>
</header>

<!-- dropdowns omitted here; same as home page (JS still attaches if present) -->

<main class="container main-content">
  <section class="game-detail">
    <div class="game-cover-col">
      <div class="game-image">
        <img class="skeleton" alt="" />
      </div>
      <div class="game-actions">
        <div class="your-rating">
          <div class="label">— Your Rating</div>
          <div class="star-input" id="star-rating-input">
            <i class="fa-solid fa-star" data-v="5"></i>
            <i class="fa-solid fa-star" data-v="4"></i>
            <i class="fa-solid fa-star" data-v="3"></i>
            <i class="fa-solid fa-star" data-v="2"></i>
            <i class="fa-solid fa-star" data-v="1"></i>
          </div>
        </div>
        <div class="action-row">
          <button class="icon-btn icon-btn--played"><i class="fa-solid fa-circle-check"></i>Played</button>
          <button class="icon-btn icon-btn--like"><i class="fa-solid fa-heart"></i>Like</button>
          <button class="icon-btn icon-btn--list"><i class="fa-solid fa-bookmark"></i>List</button>
        </div>
        <a href="#" class="btn btn--primary btn--block"><i class="fa-solid fa-pen"></i> Write a Review</a>
      </div>
    </div>

    <div class="game-info-col">
      <h1 class="game-title skeleton">Loading…</h1>

      <div class="game-rating-row">
        <div class="big-rating" id="rating-number">—</div>
        <div class="rating-meta">
          <div class="stars" id="star-rating"></div>
          <div id="review-count">(0 ratings)</div>
        </div>
      </div>

      <p class="game-description skeleton">Loading description…</p>

      <div class="game-meta-grid">
        <div class="meta-item">
          <div class="meta-label">— Genres &amp; Themes</div>
          <div class="meta-value"><div class="tag-list" id="genre-tags"></div></div>
        </div>
        <div class="meta-item">
          <div class="meta-label">— Platforms</div>
          <div class="meta-value"><div class="tag-list" id="platform-tags"></div></div>
        </div>
        <div class="meta-item">
          <div class="meta-label">— Developer</div>
          <div class="meta-value skeleton" id="developer-list">—</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">— Publisher</div>
          <div class="meta-value skeleton" id="publisher-list">—</div>
        </div>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container footer-bottom"><span>© 2026 Rankr</span><span>Game data via IGDB</span></div>
</footer>

<script src="/js/game.js" defer></script>
<script>
  // Star input interaction
  document.querySelectorAll('.star-input').forEach(group => {
    const stars = [...group.querySelectorAll('i')];
    stars.forEach(star => {
      star.addEventListener('click', () => {
        const v = +star.dataset.v;
        stars.forEach(s => s.classList.toggle('active', +s.dataset.v <= v));
      });
    });
  });
</script>
</body>
</html>
